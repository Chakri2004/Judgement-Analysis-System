<style>
.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 40px;
    background:rgb(67, 65, 65);
}
.top-right {
    display:flex;
    align-items:center;
    gap:15px;
}
.top-btn {
    text-decoration:none;
    color:white;
    font-weight:600;
}
.user-name {
    font-weight:600;
}
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 40px;
    background:rgb(51, 48, 48);
    color:white;
}
.nav-links { 
    display:flex; 
    gap:20px; 
    align-items:center; 
}
.nav-links a {
    color:white;
    text-decoration:none;
    padding:5px 8px;
    transition:0.3s;
    font-weight: bold;
}
.nav-links a:not(.nav-link) {
    position: relative;
    color: white;
    text-decoration: none;
    padding: 5px 8px;
    font-weight: bold;
}
.nav-links a:not(.nav-link)::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 0%;
    height: 2px;
    background: white;
    transition: width 0.3s ease;
}
.nav-links a:not(.nav-link):hover::after {
    width: 100%;
}
.nav-link i{
    font-size:18px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}
.nav-link i:hover{
    transform:scale(1.2);
}
.custom-brand {
    color: white !important;
    text-decoration: none !important;
    font-size: 22px;
    font-weight: bold;
}
.custom-brand:hover {
    text-decoration: none !important;
}
.search-icon {
    cursor:pointer;
    font-size:18px;
    transition:0.3s;
}
.search-icon:hover {
    transform:scale(1.2);
}
.dropdown {
    position:relative;
    cursor:pointer;
}
.user-box {
    border:1px solid white;
    padding:6px 12px;
    border-radius:6px;
    transition:0.3s;
}
.user-box:not(.avatar-circle):hover {
    background: rgba(0, 0, 0, 0.05);
}
.avatar-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #000;
    color: #fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
}
.dropdown-content {
    display:none;
    position:absolute;
    right:0;
    background:white;
    min-width:140px;
    box-shadow:0 8px 16px rgba(0,0,0,0.1);
    border-radius:6px;
}
.dropdown-content a {
    display:block;
    padding:10px;
    color:black;
    text-decoration:none;
}
.dropdown-content a:hover { 
    background:#f2f2f2; 
}
.menu-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    opacity:0;
    pointer-events:none;
    transition:0.4s ease;
    z-index:5000;
}
.menu-overlay.active{
    opacity:1;
    pointer-events:auto;
}
.menu-left{
    width:30%;
    padding:120px 80px;
    background:rgba(0,0,0,0.9);
    backdrop-filter:blur(12px);
    color:white;
    padding:140px 80px;
    transform:translateX(-50px);
    transition:0.4s;
}
.close-btn{
    position:absolute;
    right:50px;
    top:40px;
    font-size:30px;
    color:white;
    cursor:pointer;
}
.menu-right{
    width:70%;
    background:#f9fafb;
    height:100%;
    transform:translateX(50px);
    transition:0.4s;
}
.menu-overlay.active .menu-left{
    transform:translateX(0);
}
.menu-overlay.active .menu-right{
    transform:translateX(0);
}
.menu-item{
    font-size:28px;
    margin:30px 0;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
    transition:0.2s;
}
.menu-item:hover{
    transform:translateX(8px);
    opacity:0.7;
}
.close-btn{
    position:absolute;
    right:50px;
    top:40px;
    font-size:50px;
    color:black;
    cursor:pointer;
}
.dashboard-frame{
    width:100%;
    height:100%;
    border:none;
    border-radius:20px 0 0 20px;
}
#menuContent {
    transition: all 0.3s ease;
}
.fade-out {
    opacity: 0;
    transform: translateX(20px);
}
.fade-in {
    opacity: 1;
    transform: translateX(0);
}
#menuContent h1 {
    animation: fadeUp 0.5s ease;
}
@keyframes fadeUp {
    from {
        opacity:0;
        transform: translateY(20px);
    }
    to {
        opacity:1;
        transform: translateY(0);
    }
}
</style>
<div class="top-bar">
    <div></div>
    <div class="top-right">
        {% if current_user.is_authenticated %}
            <span class="user-name">{{ current_user.email }}</span>
            <a href="{{ url_for('auth.logout') }}" class="top-btn">Sign Out</a>
        {% else %}
            <a href="{{ url_for('auth.login') }}" class="top-btn">Sign In</a>
        {% endif %}
    </div>
</div>

<!-- MAIN NAVBAR -->
<div class="navbar">
    <div>
        <a class="custom-brand" href="{{ url_for('main_home') }}">  
            Judgement Analysis
        </a>
    </div>

    <div class="nav-links">
        <a href="/workspace">Workspace</a>
        <a href="/help">Help</a>
        <div class="search-icon" onclick="openSearch()">
            <i class="fas fa-search"></i>
        </div>
    </div>
</div>
