<div id="searchOverlay" class="search-overlay">

    <!-- TOP SEARCH BAR -->
    <div class="search-top">
        <input 
            type="text" 
            id="searchInput" 
            placeholder="Search"
            onkeyup="handleSearch()"
        >
        <div class="close-btn" onclick="closeSearch()">x</div>
    </div>

    <!-- RESULTS -->
    <div id="searchResults" class="search-results"></div>
</div>
<style>
.search-overlay {
    position: fixed;
    top: 122px;
    left: 0;
    width: 100%;
    height: calc(100% - 80px);
    background: rgb(67, 65, 65);
    display: none;
    flex-direction: column;
    z-index: 9999;
}
.search-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px;
    border-bottom: 1px solid white;
}
#searchInput {
    width: 100%;
    max-width: 700px;
    padding: 14px 20px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 40px;
    background: rgb(67, 65, 65);
    color: white;
}
.close-btn {
    position: absolute;
    right: 60px;
    top: 7%;
    transform: translateY(-50%);
    font-size: 80px;
    font-weight: 100;
    color: white;
    cursor: pointer;
}
.search-results {
    padding: 30px;
    overflow-y: auto;
}
.search-item {
    background: rgb(67, 65, 65);
    color: white;
    padding: 18px;
    border-radius: 10px;
    margin-bottom: 12px;
    cursor: pointer;
    font-size: 20px;
}
.search-item small {
    font-size: 20px;
    color: #d1d5db;
}
.search-item:hover {
    background: rgb(67, 65, 65);
}
</style>
<script>
window.globalSearchData = [

    { title: "Analyze Case", desc: "Upload or enter a case", url: "/analyze" },
    { title: "Browse Cases", desc: "Search saved cases", url: "/cases" },
    { title: "Saved Cases", desc: "Bookmarked cases", url: "/bookmarks" },
    { title: "AI Assistant", desc: "Ask legal questions", url: "/workspace/assistant" },

    { title: "Case Understanding", desc: "Extract key facts", url: "/case-understanding" },
    { title: "Domain Classification", desc: "Identify legal domains", url: "/domain-classification" },
    { title: "Smart Summarization", desc: "Generate summaries", url: "/summarization" },

    { title: "Overview", desc: "About platform", url: "/careers" },
    { title: "How It Works", desc: "System explanation", url: "/how-it-works" },
    { title: "Support", desc: "Help and FAQ", url: "/help" },
    { title: "API Access", desc: "Developer API", url: "/api-access" },

    { title: "Privacy Policy", desc: "User data policy", url: "/privacy" },
    { title: "Terms", desc: "Terms of use", url: "/terms" },
    { title: "Security", desc: "Data protection", url: "/footer/security" },

    { title: "Workspace", desc: "Main dashboard", url: "/workspace" }

];
</script>
<script>
function openSearch(){
    document.getElementById("searchOverlay").style.display = "flex";
    document.getElementById("searchInput").focus();
}
function closeSearch(){
    document.getElementById("searchOverlay").style.display = "none";
    document.getElementById("searchResults").innerHTML = "";
    document.getElementById("searchInput").value = "";
}
function handleSearch(){
    const query = document.getElementById("searchInput").value.toLowerCase();
    const resultsBox = document.getElementById("searchResults");
    console.log("Query:", query);
    console.log("caseData:", window.caseData);
    if(!query){
        resultsBox.innerHTML = "";
        return;
    }
    let caseResults = (window.caseData || []).filter(doc =>
        (doc.title || "").toLowerCase().includes(query) ||
        (doc.main_category || "").toLowerCase().includes(query) ||
        (doc.status || "").toLowerCase().includes(query) ||
        (doc.nature_of_dispute || "").toLowerCase().includes(query) ||
        (doc.summary || "").toLowerCase().includes(query)
    ).map(doc => ({
        title: doc.title || "Untitled Case",
        desc: doc.main_category || "Case",
        url: "/view/" + doc._id
    }));
    let staticResults = (window.globalSearchData || []).filter(item =>
        (item.title || "").toLowerCase().includes(query) ||
        (item.desc || "").toLowerCase().includes(query)
    );
    let allResults = [...caseResults, ...staticResults];
    if(allResults.length === 0){
        resultsBox.innerHTML = `
            <p style='color:white'>
            No results found for "<b>${query}</b>"
            </p>
        `;
        return;
    }
    resultsBox.innerHTML = allResults.map(item => `
        <div class="search-item" onclick="goToPage('${item.url}')">
            <strong>${highlight(item.title, query)}</strong><br>
            <small>${highlight(item.desc, query)}</small>
        </div>
    `).join("");
}
function goToPage(url){
    window.location.href = url;
}
function highlight(text, query){
    if(!text) return "";
    const regex = new RegExp(`(${query})`, "gi");
    return text.replace(regex, "<span style='color:#60a5fa'>$1</span>");
}
</script>
