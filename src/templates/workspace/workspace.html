{% extends "home.html" %}
{% block content %}
<style>
.workspace {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}
.workspace h1 {
    font-size: 28px;
    margin-bottom: 20px;
}
.stats {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}
.stats .card {
    flex: 1;
    padding: 20px;
    border-radius: 12px;
    background: #f3f4f6;
    text-align: center;
}
.actions {
    display: flex;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}
.card {
    flex: 1;
    padding: 20px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    cursor: pointer;
    transition: 0.2s;
}
.card:hover {
    transform: translateY(-3px);
}
.filters input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    margin-bottom: 20px;
}
.section {
    margin-top: 30px;
}
.section .card {
    margin-bottom: 15px;
}
.empty {
    text-align: center;
    color: #777;
    padding: 40px 0;
}
.card {
    flex: 1;
    border-radius: 16px;
    overflow: hidden;
    background: white;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    cursor: pointer;
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-5px);
}
.card-img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}
.card-body {
    padding: 15px;
}
.card-body h3 {
    margin-bottom: 8px;
}
.card-body p {
    color: #666;
    font-size: 14px;
}
</style>
<div class="workspace">
    <h1>Workspace</h1>

    <div class="actions">
        <div class="card" onclick="location.href='/analyze'">
            <img src="{{ url_for('static', filename='analyze.jpg') }}" class="card-img">
            <div class="card-body">
                <h3>Analyze Case</h3>
                <p>Upload or enter a case to extract insights.</p>
            </div>
        </div>

        <div class="card" onclick="location.href='/cases'">
            <img src="{{ url_for('static', filename='browse.jpg') }}" class="card-img">
            <div class="card-body">
                <h3>Browse Cases</h3>
                <p>Search and explore saved legal cases.</p>
            </div>
        </div>

        <div class="card" onclick="location.href='/bookmarks'">
            <img src="{{ url_for('static', filename='saved.jpg') }}" class="card-img">
            <div class="card-body">
                <h3>Saved Cases</h3>
                <p>Access your bookmarked cases quickly.</p>
            </div>
        </div>

        <div class="card" onclick="location.href='/workspace/assistant'">
            <img src="{{ url_for('static', filename='ai.avif') }}" class="card-img">
            <div class="card-body">
                <h3>AI Assistant</h3>
                <p>Ask legal questions instantly.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
