{% extends "home.html" %}
{% block content %}
<style>
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}
.chat-box {
    height: 65vh;
    overflow-y: auto;
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}
.message {
    margin-bottom: 12px;
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
}
.user {
    background: black;
    color: white;
    margin-left: auto;
}
.bot {
    background: #f3f4f6;
    border: 1px solid #e5e7eb;
}
.input-box {
    display: flex;
    gap: 10px;
    position: sticky;
    bottom: 0;
}
.input-box input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
}
.input-box button {
    padding: 12px 18px;
    background: black;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
.input-box button:hover {
    background: black;
}
</style>
<div class="container">
    <h2>Legal AI Assistant</h2>
    <div id="chat" class="chat-box"></div>
    <div class="input-box">
        <input type="text" id="question" placeholder="Ask something about legal case...">
        <button onclick="sendQuestion()">Send</button>
    </div>
</div>
<script>
async function sendQuestion() {
    const input = document.getElementById("question");
    const chat = document.getElementById("chat");
    const question = input.value.trim();
    if (!question) return;
    chat.innerHTML += `<div class="message user">${question}</div>`;
    input.value = "";
    const loading = document.createElement("div");
    loading.className = "message bot";
    loading.innerText = "Thinking...";
    chat.appendChild(loading);
    chat.scrollTop = chat.scrollHeight;
    try {
        const res = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question })
        });
        const data = await res.json();
        loading.remove();
        chat.innerHTML += `<div class="message bot">${data.answer}</div>`;
        chat.scrollTop = chat.scrollHeight;
    } catch (err) {
        loading.innerText = "Error getting response";
    }
}
</script>
{% endblock %}
